litellm_settings:
  # By default, if you pass an OpenAI-style parameter to downstream providers
  # and they do not support it, Litellm will throw errors, so we disable that
  # behavior
  drop_params: true

general_settings:
  master_key: sk-local
model_list:
  # Standard language model
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434
      supports_function_calling: true
  # Embedding model
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434
  # Vision model
  - model_name: llama3.2-vision
    litellm_params:
      model: ollama/llama3.2-vision
      api_base: http://ollama:11434

